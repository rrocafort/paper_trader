{% extends "base.html" %}

{% block content %}
<div class="dashboard-container">
    <h1>Reset Account</h1>

    <div class="chart-card">
        <p style="margin-bottom: 20px;">
            This will delete all trades, holdings, and reset your balance.
        </p>

        <form method="POST">
            {% csrf_token %}
            <button type="submit" class="top-strip-btn" style="background-color: #dc2626; color: white;">
                Yes, Reset Account
            </button>

            <a href="{% url 'home' %}" class="top-strip-btn" style="margin-left: 10px;">
                Cancel
            </a>
        </form>
    </div>
</div>
{% endblock %}
